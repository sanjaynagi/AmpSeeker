# This file should contain everything to configure the workflow on a global scale.
# In case of sample based data, it should be complemented by a samples.tsv file that contains
# one row per sample. It can be parsed easily via pandas.
dataset: natcomms
platform: illumina
# Sample ploidy. Use 1 for haploid organisms, 2 for diploid (default),
# or higher integers for polyploids (tetraploid = 4, etc.).
# Polyploid (>2) is supported for Illumina only — Nanopore is restricted
# to ploidy 1 or 2 because clair3 has no polyploid mode.
ploidy: 2
panel: ag-vampir
cohort-columns:
  - location
  - taxon
  - country
targets: config/ag-vampir.bed
metadata: ""

# Directory of Illumina Miseq Run, can be empty 
illumina-dir: 
  - resources/250110_M05658_0028_000000000-LTBV4
  - resources/14_02_2024_MiSeq_output

# Specify whether reference  provided is amplicon or wholegenome sequence data
# Genome fasta reference files
reference-name: AgamP4
reference-fasta: resources/reference/AgamP4.fa
reference-gff3: resources/reference/AgamP4.gff
reference-snpeffdb: Anopheles_gambiae
custom-snpeffdb: False

# Specify whether to convert bcl files to fastq
# or whether we provide fastq data in the metadata / or auto naming 
from-bcl: True
fastq:
  auto: True

# Specify whether to run quality-control analyses
quality-control:
  sample-min-mean-target-coverage: 5

  fastp: True
  coverage: True
  stats: True
  multiqc: True

# Specify whether to run generic analyses
analysis:  
  igv: False
  sample-map: False # needs lat and longs
  population-structure: True
  genetic-diversity: True
  allele-frequencies: True

# Specify whether to build jupyter results book
build-jupyter-book: True
